name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (editable) with dependencies
        run: pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -t tests -v
      - name: Smoke-test installed console script
        run: |
          innomd --version
          echo '# hi' | innomd --no-pager
